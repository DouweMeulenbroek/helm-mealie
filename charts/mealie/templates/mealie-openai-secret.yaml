{{- if and .Values.openai.enabled (not .Values.openai.existingSecret) .Values.openai.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-openai" .Release.Name }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  {{ .Values.openai.secretKeys.apiKey | default "OPENAI_API_KEY" }}: {{ .Values.openai.apiKey | quote }}
{{- end }}