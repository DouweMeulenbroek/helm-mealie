{{- if and .Values.postgresql.enabled .Values.postgresql.auth.existingSecret }}
{{- $secretName := .Values.postgresql.auth.existingSecret }}
{{- $adminKey := .Values.postgresql.auth.secretKeys.adminPasswordKey | default "postgresPassword" }}
{{- $userKey := .Values.postgresql.auth.secretKeys.userPasswordKey | default "password" }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}

{{- if not $existing }}
  {{- if or (not .Values.postgresql.auth.password) (not .Values.postgresql.auth.postgresPassword) }}
    {{- fail "postgresql.auth.password and postgresql.auth.postgresPassword are required when creating the PostgreSQL secret. Random DB passwords are intentionally not generated because persistent PVC recovery requires known credentials." }}
  {{- end }}
{{- end }}

{{- $adminPassword := .Values.postgresql.auth.postgresPassword | b64enc }}
{{- $userPassword := .Values.postgresql.auth.password | b64enc }}

{{- if $existing }}
  {{- if hasKey $existing.data $adminKey }}
    {{- $adminPassword = index $existing.data $adminKey }}
  {{- end }}
  {{- if hasKey $existing.data $userKey }}
    {{- $userPassword = index $existing.data $userKey }}
  {{- end }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{ $adminKey }}: {{ $adminPassword | quote }}
  {{ $userKey }}: {{ $userPassword | quote }}
{{- end }}